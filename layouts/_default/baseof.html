<!DOCTYPE html>
<html lang="{{ site.LanguageCode | default "en" }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} — SessionClick{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}" />
  <meta property="og:title" content="{{ site.Title }}" />
  <meta property="og:description" content="{{ site.Params.description }}" />
  <meta property="og:image" content="{{ "images/banner.png" | absURL }}" />
  <meta property="og:url" content="{{ .Permalink }}" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="icon" href="{{ "favicon.ico" | relURL }}" />
  <link rel="apple-touch-icon" href="{{ "images/icon-192.png" | relURL }}" />
  {{ $css := resources.Get "css/main.css" | resources.Minify | resources.Fingerprint }}
  <link rel="stylesheet" href="{{ $css.RelPermalink }}" integrity="{{ $css.Data.Integrity }}" />
</head>
<body>
  {{ block "main" . }}{{ end }}
  {{ partial "footer.html" . }}
</body>
</html>
